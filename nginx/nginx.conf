# ─────────────────────────────────────────────────────────────────────────────
# nginx reverse-proxy — Global Market Intelligence (AIP)
#
# Replace every occurrence of "example.com" with your actual domain, or run:
#   sed -i 's/example\.com/yourdomain.com/g' nginx/nginx.conf
#
# Expected DNS A records (point all three to your Hostinger VPS IP):
#   example.com      — Next.js frontend  (proxied to container port 3000)
#   www.example.com  — redirect to example.com
#   api.example.com  — FastAPI backend   (proxied to container port 8000)
#
# TLS certificates are managed by Certbot (Let's Encrypt).
# Issue the first certificate with:  ./scripts/init-letsencrypt.sh example.com admin@example.com
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log  /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1000;
    gzip_vary       on;

    # ── Rate-limiting zones ───────────────────────────────────────────────────
    # General API endpoints: 30 req/min per IP, burst of 20
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=30r/m;
    # Auth endpoints (login / register): 10 req/min per IP, burst of 5
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_status 429;

    # ── Shared TLS settings ───────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # ── HTTP → HTTPS redirect (+ Let's Encrypt ACME challenge) ───────────────
    server {
        listen      80;
        server_name example.com www.example.com api.example.com;

        # Certbot webroot challenge — must remain on plain HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend — https://example.com ───────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name example.com www.example.com;

        ssl_certificate      /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/example.com/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

        # Proxy to Next.js
        location / {
            proxy_pass          http://frontend:3000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade            $http_upgrade;
            proxy_set_header    Connection         "upgrade";
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_cache_bypass  $http_upgrade;
            proxy_read_timeout  60s;
        }

        # Cache Next.js immutable static assets for 1 year
        location /_next/static/ {
            proxy_pass        http://frontend:3000;
            proxy_set_header  Host $host;
            add_header        Cache-Control "public, max-age=31536000, immutable" always;
        }
    }

    # ── Backend API — https://api.example.com ────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name api.example.com;

        ssl_certificate      /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/example.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        # Auth endpoints — stricter rate limit
        location ~ ^/auth/ {
            limit_req           zone=auth burst=5 nodelay;
            proxy_pass          http://backend:8000;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
        }

        # All other API routes
        location / {
            limit_req           zone=api burst=20 nodelay;
            proxy_pass          http://backend:8000;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_read_timeout  120s;
            proxy_connect_timeout 15s;
        }
    }
}
